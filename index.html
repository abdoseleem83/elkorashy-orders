<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>القرشي | طلبات الموزعين</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --navy:#1F3050;
  --navy-deep:#152238;
  --navy-soft:#2C4368;
  --gold:#C9A227;
  --gold-light:#E4C766;
  --bg:#F5F3EE;
  --card:#FFFFFF;
  --ink:#20242B;
  --muted:#6E7480;
  --line:#E4E0D6;
  --success:#2F7D5A;
  --success-bg:#E7F3EC;
  --danger:#B3261E;
  --radius:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Cairo',sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
#app{max-width:640px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);}

/* ---------- profile motif ---------- */
.profile-bar{
  height:10px;
  display:flex;
  width:100%;
}
.profile-bar span{flex:1;}
.profile-bar span:nth-child(1){background:var(--gold);}
.profile-bar span:nth-child(2){background:var(--navy-soft);}
.profile-bar span:nth-child(3){background:var(--gold-light);}
.profile-bar span:nth-child(4){background:var(--navy);}
.profile-bar span:nth-child(5){background:var(--gold);}

.chambers{
  display:flex;
  gap:3px;
  height:22px;
  margin:0 0 2px 0;
}
.chambers i{
  flex:1;
  border:1.5px solid rgba(255,255,255,.35);
  border-radius:2px;
}

/* ---------- header ---------- */
header.top{
  background:linear-gradient(155deg,var(--navy) 0%,var(--navy-deep) 100%);
  color:#fff;
  padding:22px 20px 18px;
  position:relative;
  overflow:hidden;
}
header.top .brand{
  display:flex;
  align-items:center;
  gap:12px;
}
header.top .mark{
  width:46px;height:46px;border-radius:10px;
  background:var(--gold);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
header.top .mark .chambers{margin:0;height:26px;width:28px;}
header.top .mark .chambers i{border-color:rgba(31,48,80,.55);}
header.top h1{font-size:20px;margin:0;font-weight:800;letter-spacing:.2px;}
header.top p.sub{margin:2px 0 0;font-size:12.5px;color:#C7D0DE;font-weight:500;}

nav.tabs{
  display:flex;
  gap:8px;
  margin-top:18px;
}
nav.tabs button{
  flex:1;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.16);
  color:#DCE3EE;
  padding:10px 8px;
  border-radius:10px;
  font-family:'Cairo',sans-serif;
  font-weight:700;
  font-size:13.5px;
  cursor:pointer;
  transition:.15s;
}
nav.tabs button.active{
  background:var(--gold);
  border-color:var(--gold);
  color:var(--navy-deep);
}

main{flex:1;padding:18px 16px 100px;}

/* ---------- cards / sections ---------- */
.card{
  background:var(--card);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:14px;
  border:1px solid var(--line);
}
.card h2{
  font-size:14.5px;
  margin:0 0 12px;
  font-weight:800;
  color:var(--navy);
  display:flex;
  align-items:center;
  gap:8px;
}
.card h2 .num{
  width:22px;height:22px;border-radius:6px;
  background:var(--navy);color:#fff;
  font-size:11.5px;display:flex;align-items:center;justify-content:center;
  font-weight:800;flex-shrink:0;
}

label{
  display:block;
  font-size:12.5px;
  font-weight:700;
  color:var(--muted);
  margin-bottom:6px;
}
input[type=text],input[type=tel],input[type=number],textarea{
  width:100%;
  border:1.5px solid var(--line);
  border-radius:10px;
  padding:11px 12px;
  font-family:'Cairo',sans-serif;
  font-size:14.5px;
  color:var(--ink);
  background:#FCFBF8;
}
input:focus,textarea:focus,button:focus-visible{
  outline:2px solid var(--gold);
  outline-offset:1px;
  border-color:var(--gold);
}
textarea{resize:vertical;min-height:60px;}
.field{margin-bottom:12px;}
.field:last-child{margin-bottom:0;}
.row2{display:flex;gap:10px;}
.row2 .field{flex:1;}

/* chips */
.chipwrap{display:flex;flex-wrap:wrap;gap:8px;}
.chip{
  border:1.5px solid var(--line);
  background:#FCFBF8;
  color:var(--ink);
  padding:9px 14px;
  border-radius:999px;
  font-family:'Cairo',sans-serif;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
}
.chip.active{
  background:var(--navy);
  border-color:var(--navy);
  color:#fff;
}
.chip.gold.active{background:var(--gold);border-color:var(--gold);color:var(--navy-deep);}

.searchbox{position:relative;margin-bottom:10px;}
.searchbox input{padding-left:14px;}

.productgrid{
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:7px;
  max-height:320px;
  overflow-y:auto;
  padding:2px;
}
.productgrid .ptile{
  border:1.5px solid var(--line);
  border-radius:9px;
  background:#FCFBF8;
  padding:8px 5px;
  font-size:10.5px;
  line-height:1.25;
  text-align:center;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:56px;
  word-break:break-word;
}
.productgrid .ptile:hover{background:#F0EDE4;}
.productgrid .ptile.selected{background:var(--navy);color:#fff;border-color:var(--navy);font-weight:700;}
.productgrid .empty{
  grid-column:1 / -1;
  padding:20px;text-align:center;color:var(--muted);font-size:13px;
}

.qtystepper{display:flex;align-items:center;gap:10px;}
.qtystepper button{
  width:38px;height:38px;border-radius:10px;border:1.5px solid var(--line);
  background:#FCFBF8;font-size:18px;font-weight:800;color:var(--navy);cursor:pointer;
}
.qtystepper input{text-align:center;width:70px;}

.addbtn{
  width:100%;
  background:var(--navy);
  color:#fff;
  border:none;
  border-radius:10px;
  padding:13px;
  font-family:'Cairo',sans-serif;
  font-weight:800;
  font-size:14.5px;
  cursor:pointer;
  margin-top:14px;
}
.addbtn:disabled{background:#B9C0CD;cursor:not-allowed;}

/* cart */
.cartrow{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:11px 0;
  border-bottom:1px solid var(--line);
  gap:10px;
}
.cartrow:last-child{border-bottom:none;}
.cartrow .info{flex:1;min-width:0;}
.cartrow .pname{font-size:13.5px;font-weight:700;color:var(--ink);}
.cartrow .pmeta{font-size:12px;color:var(--muted);margin-top:2px;}
.cartrow .qty{font-size:13.5px;font-weight:800;color:var(--navy);white-space:nowrap;}
.cartrow .del{
  background:none;border:none;color:var(--danger);font-size:18px;cursor:pointer;padding:4px 6px;
}
.cartempty{color:var(--muted);font-size:13px;text-align:center;padding:14px 0;}

.submitbar{
  position:sticky;bottom:0;left:0;right:0;
  background:linear-gradient(0deg,var(--bg) 60%,transparent);
  padding:14px 16px 18px;
  margin-top:-10px;
}
.submitbtn{
  width:100%;
  background:var(--gold);
  color:var(--navy-deep);
  border:none;
  border-radius:12px;
  padding:15px;
  font-family:'Cairo',sans-serif;
  font-weight:800;
  font-size:15.5px;
  cursor:pointer;
  box-shadow:0 6px 18px rgba(201,162,39,.35);
}
.submitbtn:disabled{background:#D9D2BC;box-shadow:none;cursor:not-allowed;color:#8A8470;}

/* success screen */
.success{
  text-align:center;
  padding:60px 20px;
}
.success .ic{
  width:70px;height:70px;border-radius:50%;
  background:var(--success-bg);color:var(--success);
  display:flex;align-items:center;justify-content:center;
  font-size:34px;margin:0 auto 18px;
}
.success h2{color:var(--navy);font-size:19px;margin:0 0 8px;}
.success p{color:var(--muted);font-size:13.5px;margin:0 0 22px;}
.success .ordid{
  display:inline-block;background:#fff;border:1.5px solid var(--line);
  border-radius:10px;padding:8px 16px;font-weight:800;color:var(--navy);font-size:14px;letter-spacing:.5px;
}
.newbtn{
  margin-top:22px;background:var(--navy);color:#fff;border:none;border-radius:10px;
  padding:12px 24px;font-family:'Cairo',sans-serif;font-weight:700;font-size:14px;cursor:pointer;
}
.newbtn.outline{background:none;border:1.5px solid var(--navy);color:var(--navy);margin-top:10px;}
.receiptpreview{
  margin:18px auto 4px;max-width:280px;border-radius:12px;overflow:hidden;
  border:1px solid var(--line);box-shadow:0 6px 18px rgba(0,0,0,.08);
}
.receiptpreview img{width:100%;display:block;}
.receiptbtns{display:flex;flex-direction:column;gap:8px;max-width:280px;margin:0 auto;}
.receiptbtns .newbtn{margin-top:8px;width:100%;}

/* admin */
.pingate{padding:60px 20px;text-align:center;}
.pingate .ic{font-size:30px;margin-bottom:12px;}
.pingate input{max-width:180px;margin:14px auto;text-align:center;letter-spacing:4px;font-size:18px;}
.pingate button{
  background:var(--navy);color:#fff;border:none;border-radius:10px;padding:11px 26px;
  font-family:'Cairo',sans-serif;font-weight:700;cursor:pointer;
}
.pingate .err{color:var(--danger);font-size:12.5px;margin-top:8px;}

.adminbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.adminbar input{flex:1 1 100%;}
.adminbar .exportbtn{flex:1;padding:10px 8px;}
.exportbtn{
  background:var(--navy);color:#fff;border:none;border-radius:10px;padding:0 14px;
  font-family:'Cairo',sans-serif;font-weight:700;font-size:12.5px;cursor:pointer;white-space:nowrap;
}
.exportbtn.danger{background:var(--danger);}
.delbtn{
  margin-top:10px;width:100%;background:none;border:1.5px solid var(--danger);color:var(--danger);
  border-radius:10px;padding:9px;font-family:'Cairo',sans-serif;font-weight:700;font-size:12.5px;cursor:pointer;
}
.statuschips{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.statuschips .chip{padding:6px 12px;font-size:12px;}

.ordercard{margin-bottom:12px;}
.ordercard .ohead{
  display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;
  padding-bottom:10px;border-bottom:1px dashed var(--line);
}
.ordercard .dname{font-weight:800;font-size:14.5px;color:var(--navy);}
.ordercard .dmeta{font-size:11.5px;color:var(--muted);margin-top:3px;}
.ordercard .oid{font-size:11px;color:var(--muted);font-weight:700;}
.statusbadge{
  font-size:11px;font-weight:800;padding:5px 10px;border-radius:999px;white-space:nowrap;cursor:pointer;
  border:none;font-family:'Cairo',sans-serif;
}
.statusbadge.pending{background:#FBEBD1;color:#8A5A00;}
.statusbadge.done{background:var(--success-bg);color:var(--success);}
.ordercard .items{font-size:12.5px;}
.ordercard .item-row{display:flex;justify-content:space-between;padding:4px 0;color:var(--ink);}
.ordercard .item-row b{color:var(--navy);}
.ordercard .note{
  margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);
  font-size:12px;color:var(--muted);
}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:13.5px;}
.emptystate{text-align:center;padding:50px 20px;color:var(--muted);}
.emptystate .ic{font-size:30px;margin-bottom:10px;}

.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--navy-deep);color:#fff;padding:11px 20px;border-radius:10px;
  font-size:13px;font-weight:600;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,.25);
  max-width:90%;text-align:center;
}

@media (min-width:480px){
  header.top{padding:26px 28px 22px;}
  main{padding:22px 24px 100px;}
}
</style>

</style>
</head>

  mainGroup:null,
  productSearch:'',
  selectedProduct:null,
  selectedColor:null,
  colorRequired:true,
  selectedUnit:null,
  qty:1,
  cart:[],
  distName:'',
  distRegion:'',
  distPhone:'',
  note:'',
  submitting:false,
  successOrderId:null,
  lastOrder:null,
  receiptImageUrl:null,
  receiptGenerating:false,
  adminUnlocked:false,
  pinInput:'',
  pinError:false,
  orders:[],
  ordersLoading:false,
  adminFilter:'',
  adminStatusFilter:'all',
};

const ADMIN_PIN = '3184';

// ===== helpers =====
const $ = sel => document.querySelector(sel);
const esc = s => (s==null?'':String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const MAIN_GROUPS = [...new Set(CATALOG.map(d=>d.main))];

function productsForGroup(main){
  const seen = new Map();
  CATALOG.filter(d=>d.main===main).forEach(d=>{
    if(!seen.has(d.product)) seen.set(d.product, []);
    seen.get(d.product).push(d);
  });
  return seen;
}

function colorsForProduct(main, product){
  return CATALOG.filter(d=>d.main===main && d.product===product);
}

function hasRealColors(main, product){
  return colorsForProduct(main, product).some(c => c.color);
}

function unitOptionsForGroup(main){
  if(['قطاعات PVC كومبن','قطاعات كرافت لاين','نيو لاين','شاتر'].includes(main)) return ['لفة','عود'];
  if(main.includes('اكسسوارات')) return ['كرتونة','قطعة'];
  return ['قطعة'];
}

let toastTimer=null;
function showToast(msg){
  clearTimeout(toastTimer);
  let t = $('#toast');
  if(!t){
    t = document.createElement('div');
    t.id='toast'; t.className='toast';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.display='block';
  toastTimer = setTimeout(()=>{ t.style.display='none'; }, 2600);
}

function chambersHtml(n=5){
  let s = '<div class="chambers">';
  for(let i=0;i<n;i++) s += '<i></i>';
  return s + '</div>';
}

// ===== storage (Google Sheet via Apps Script) =====
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxhvIgVLmF5dhMoB63mQTkrpkdm7XHHD0O6UubJlFIFk9BJ9vDkd39qeG14JhkWQZhD/exec';

async function saveOrder(order){
  await fetch(APPS_SCRIPT_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify(order)
  });
}

async function loadOrders(){
  state.ordersLoading = true; render();
  try{
    const res = await fetch(APPS_SCRIPT_URL);
    const data = await res.json();
    state.orders = Array.isArray(data) ? data : [];
  }catch(e){
    state.orders = [];
  }
  state.ordersLoading = false;
  render();
}

async function updateOrderStatus(id, status){
  const ord = state.orders.find(o=>o.id===id);
  if(!ord) return;
  ord.status = status;
  try{
    await fetch(APPS_SCRIPT_URL + '?action=updateStatus&id=' + encodeURIComponent(id) + '&status=' + encodeURIComponent(status));
    showToast('تم تحديث حالة الطلب');
  }catch(e){
    showToast('حصل خطأ، حاول تاني');
  }
  render();
}

async function deleteOrder(id){
  try{
    await fetch(APPS_SCRIPT_URL + '?action=delete&id=' + encodeURIComponent(id));
    state.orders = state.orders.filter(o=>o.id!==id);
    showToast('تم حذف الطلب');
  }catch(e){
    showToast('حصل خطأ في الحذف، حاول تاني');
  }
  render();
}

async function deleteDeliveredOrders(){
  const count = state.orders.filter(o=>o.status==='تم التسليم').length;
  if(count===0){ showToast('مفيش طلبات "تم التسليم" حاليًا'); return; }
  try{
    await fetch(APPS_SCRIPT_URL + '?action=deleteDelivered');
    state.orders = state.orders.filter(o=>o.status!=='تم التسليم');
    showToast('تم مسح ' + count + ' طلب متسلّم');
  }catch(e){
    showToast('حصل خطأ في الحذف، حاول تاني');
  }
  render();
}

// ===== cart logic =====
function addToCart(){
  if(!state.selectedProduct || !state.selectedUnit) return;
  if(state.colorRequired && !state.selectedColor) return;
  const options = colorsForProduct(state.mainGroup, state.selectedProduct);
  const item = state.colorRequired
    ? options.find(d=>d.color===state.selectedColor)
    : options[0];
  if(!item) return;
  state.cart.push({
    name:item.name, main:item.main, product:item.product,
    color: state.colorRequired ? item.color : '', unitType: state.selectedUnit, qty: state.qty
  });
  state.selectedProduct=null; state.selectedColor=null; state.colorRequired=true; state.selectedUnit=null; state.qty=1; state.productSearch='';
  showToast('تمت إضافة الصنف للطلب');
  render();
}

function removeFromCart(idx){
  state.cart.splice(idx,1);
  render();
}

async function submitOrder(){
  if(!state.distName.trim()){ showToast('من فضلك اكتب اسم الموزع / الفرع'); return; }
  if(!state.distRegion.trim()){ showToast('من فضلك اكتب المنطقة'); return; }
  if(state.cart.length===0){ showToast('لسه محضتش أي صنف للطلب'); return; }
  state.submitting = true; render();
  const id = Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  const order = {
    id, ts: Date.now(),
    distName: state.distName.trim(),
    distRegion: state.distRegion.trim(),
    distPhone: state.distPhone.trim(),
    note: state.note.trim(),
    items: state.cart,
    status:'قيد التنفيذ'
  };
  try{
    await saveOrder(order);
    state.successOrderId = id.toUpperCase();
    state.lastOrder = order;
    state.cart=[]; state.distName=''; state.distRegion=''; state.distPhone=''; state.note='';
  }catch(e){
    showToast('حصل خطأ في إرسال الطلب، حاول تاني');
  }
  state.submitting = false;
  render();
  if(state.lastOrder) setTimeout(()=>generateReceiptImage(state.lastOrder), 150);
}

function resetOrderForm(){
  state.successOrderId = null;
  state.lastOrder = null;
  state.receiptImageUrl = null;
  render();
}

async function generateReceiptImage(order){

  state.receiptGenerating = true; render();

  wrap.style.width='380px';
  wrap.style.fontFamily = "'Cairo', sans-serif";
  wrap.style.direction='rtl';
  wrap.style.background='#FFFFFF';

  const date = new Date(order.ts);
  const dateStr = date.toLocaleDateString('ar-EG',{day:'2-digit',month:'2-digit',year:'numeric'}) + ' - ' + date.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});

  wrap.innerHTML = `
    <div style="background:linear-gradient(155deg,#1F3050,#152238);color:#fff;padding:20px;">
      <div style="font-size:16px;font-weight:800;">القرشي لأبواب وشبابيك الـ UPVC</div>
      <div style="font-size:11px;color:#C7D0DE;margin-top:2px;">وكيل AXA مصر — إيصال طلب موزع</div>
    </div>
    <div style="display:flex;height:8px;">
      <div style="flex:1;background:#C9A227;"></div>
      <div style="flex:1;background:#2C4368;"></div>
      <div style="flex:1;background:#E4C766;"></div>
      <div style="flex:1;background:#1F3050;"></div>
      <div style="flex:1;background:#C9A227;"></div>
    </div>
    <div style="padding:18px 20px;">
      <div style="font-size:11px;color:#6E7480;font-weight:700;">رقم الطلب</div>
      <div style="font-size:15px;color:#1F3050;font-weight:800;margin-bottom:12px;">#${esc(order.id.toUpperCase())}</div>
      <div style="display:flex;justify-content:space-between;border-bottom:1px dashed #E4E0D6;padding:10px 0;">
        <span style="color:#6E7480;font-size:12.5px;">الموزع</span>
        <span style="font-weight:700;font-size:12.5px;">${esc(order.distName)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;border-bottom:1px dashed #E4E0D6;padding:10px 0;">
        <span style="color:#6E7480;font-size:12.5px;">المنطقة</span>
        <span style="font-weight:700;font-size:12.5px;">${esc(order.distRegion||'')}</span>
      </div>
      <div style="display:flex;justify-content:space-between;border-bottom:1px dashed #E4E0D6;padding:10px 0;">
        <span style="color:#6E7480;font-size:12.5px;">التاريخ</span>
        <span style="font-weight:700;font-size:12.5px;">${esc(dateStr)}</span>
      </div>
      <div style="margin-top:16px;font-size:12.5px;font-weight:800;color:#1F3050;margin-bottom:8px;">الأصناف المطلوبة</div>
      ${order.items.map(it=>`
        <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #F0EDE4;font-size:12px;">
          <span style="max-width:230px;">${esc(it.product)}${it.color ? ' — ' + esc(it.color) : ''}</span>
          <span style="font-weight:800;color:#1F3050;white-space:nowrap;">×${it.qty} ${esc(it.unitType||'')}</span>
        </div>
      `).join('')}
      ${order.note ? `<div style="margin-top:14px;padding-top:10px;border-top:1px dashed #E4E0D6;font-size:11.5px;color:#6E7480;">ملاحظات: ${esc(order.note)}</div>` : ''}
    </div>
    <div style="background:#F5F3EE;padding:12px 20px;text-align:center;font-size:10.5px;color:#6E7480;">تم إنشاء الطلب عبر نظام طلبات الموزعين — القرشي</div>
  `;
  document.body.appendChild(wrap);
  try{
    const canvas = await html2canvas(wrap, {scale:2, backgroundColor:'#ffffff'});
    state.receiptImageUrl = canvas.toDataURL('image/png');
  }catch(e){
    state.receiptImageUrl = null;
  }
  document.body.removeChild(wrap);
  state.receiptGenerating = false;
  render();
}

function downloadReceiptImage(){
  if(!state.receiptImageUrl) return;
  const a = document.createElement('a');
  a.href = state.receiptImageUrl;
  a.download = 'طلب_' + (state.successOrderId||'order') + '.png';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

async function shareReceiptImage(){
  if(!state.receiptImageUrl) return;
  try{
    const res = await fetch(state.receiptImageUrl);
    const blob = await res.blob();
    const file = new File([blob], 'طلب_' + (state.successOrderId||'order') + '.png', {type:'image/png'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({
        files:[file],
        title:'طلب موزع',
        text:'طلب رقم #' + (state.successOrderId||'')
      });
      return;
    }
  }catch(e){ /* fall through to fallback */ }
  // fallback: download the image + open WhatsApp with text
  downloadReceiptImage();
  const o = state.lastOrder;
  let msg = 'طلب جديد #' + (state.successOrderId||'') + '\n';
  if(o){
    msg += 'الموزع: ' + o.distName + '\n';
    msg += 'المنطقة: ' + (o.distRegion||'') + '\n';
    o.items.forEach(it=>{ msg += '- ' + it.product + ' (' + it.color + ') ×' + it.qty + ' ' + (it.unitType||'') + '\n'; });
  }
  showToast('اتحملت الصورة — هتفتح واتساب، ارفق الصورة يدويًا');
  setTimeout(()=>{
    window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
  }, 900);
}

// ===== render: order view =====
function renderOrderView(){
  if(state.successOrderId){
    return `
    <main>
      <div class="card success">
        <div class="ic">✓</div>
        <h2>تم إرسال الطلب بنجاح</h2>
        <p>هيتم مراجعة طلبك والتواصل معاك لتأكيد التنفيذ</p>

        ${state.receiptGenerating ? '<div class="loading" style="padding:20px;">جارٍ تجهيز صورة الطلب...</div>' : ''}

          <div class="receiptbtns">
            <button class="newbtn" data-act="share-receipt">📤 إرسال عبر واتساب</button>

      </div>
    </main>`;
  }

  const groupChips = MAIN_GROUPS.map(g=>`
    <button class="chip ${state.mainGroup===g?'active':''}" data-act="set-group" data-val="${esc(g)}">${esc(g)}</button>
  `).join('');

  let productSection = '';
  if(state.mainGroup){
    const prodMap = productsForGroup(state.mainGroup);
    const q = state.productSearch.trim().toLowerCase();
    const names = [...prodMap.keys()].filter(n => !q || n.toLowerCase().includes(q));
    productSection = `
    <div class="card">
      <h2><span class="num">2</span>اختار الصنف</h2>
      <div class="searchbox">
        <input type="text" placeholder="ابحث عن اسم الصنف..." value="${esc(state.productSearch)}" data-act="search-product">
      </div>
      <div class="productgrid">
        ${names.length ? names.map(n=>`
          <div class="ptile ${state.selectedProduct===n?'selected':''}" data-act="set-product" data-val="${esc(n)}">
            <span>${esc(n)}</span>
          </div>
        `).join('') : '<div class="empty">مفيش نتائج بالاسم ده</div>'}
      </div>
    </div>`;
  }

  let colorSection = '';
  if(state.mainGroup && state.selectedProduct){
    const colors = colorsForProduct(state.mainGroup, state.selectedProduct);
    const units = unitOptionsForGroup(state.mainGroup);
    colorSection = `
    <div class="card">
      <h2><span class="num">3</span>${state.colorRequired ? 'اللون والوحدة والكمية' : 'الوحدة والكمية'}</h2>

      <label>اللون</label>
      <div class="chipwrap" style="margin-bottom:14px;">
        ${colors.map(c=>`
          <button class="chip gold ${state.selectedColor===c.color?'active':''}" data-act="set-color" data-val="${esc(c.color)}">${esc(c.color)}</button>
        `).join('')}
      </div>` : ''}
      ${units.length>1 ? `
      <label>الوحدة</label>
      <div class="chipwrap" style="margin-bottom:14px;">
        ${units.map(u=>`
          <button class="chip ${state.selectedUnit===u?'active':''}" data-act="set-unit" data-val="${esc(u)}">${esc(u)}</button>
        `).join('')}
      </div>` : ''}
      <label>الكمية${units.length===1 ? ' (' + esc(units[0]) + ')' : (state.selectedUnit ? ' (' + esc(state.selectedUnit) + ')' : '')}</label>
      <div class="qtystepper">
        <button data-act="qty-dec" type="button">−</button>
        <input type="number" min="1" value="${state.qty}" data-act="qty-input">
        <button data-act="qty-inc" type="button">+</button>

      <button class="addbtn" data-act="add-cart" ${((state.colorRequired && !state.selectedColor) || !state.selectedUnit)?'disabled':''}>إضافة للطلب</button>

        <input type="tel" inputmode="numeric" placeholder="••••" maxlength="6" value="${esc(state.pinInput)}" data-act="pin-input">

  let orders = state.orders.filter(o=>{

  const list = orders.length===0 ? `

      <div>مفيش طلبات مطابقة حاليًا</div>

      const isDone = o.status==='تم التسليم';
      return `
      <div class="card ordercard">
        <div class="ohead">
          <div>
            <div class="dname">${esc(o.distName)}</div>
            <div class="dmeta">${esc(o.distRegion||'')} · ${esc(o.distPhone||'بدون رقم')} · ${dateStr}</div>
            <div class="oid">#${esc(o.id.toUpperCase())}</div>
          </div>
          <button class="statusbadge ${isDone?'done':'pending'}" data-act="toggle-status" data-id="${esc(o.id)}">
            ${isDone?'✓ تم التسليم':'⏳ قيد التنفيذ'}
          </button>
        </div>
        <div class="items">
          ${o.items.map(it=>`
            <div class="item-row"><span>${esc(it.product)}${it.color ? ' — ' + esc(it.color) : ''}</span><b>×${it.qty} ${esc(it.unitType||'')}</b></div>

        </div>

    }).join('');

  return `
  <main>
    <div class="adminbar">

      <button class="exportbtn" data-act="export-excel">تصدير Excel</button>
      <button class="exportbtn danger" data-act="delete-delivered">مسح المُسلَّم</button>
    </div>
    <div class="statuschips">
      <button class="chip ${state.adminStatusFilter==='all'?'active':''}" data-act="admin-status" data-val="all">الكل (${state.orders.length})</button>
      <button class="chip ${state.adminStatusFilter==='قيد التنفيذ'?'active':''}" data-act="admin-status" data-val="قيد التنفيذ">قيد التنفيذ</button>
      <button class="chip ${state.adminStatusFilter==='تم التسليم'?'active':''}" data-act="admin-status" data-val="تم التسليم">تم التسليم</button>
    </div>
    ${list}
  </main>`;
}

// ===== main render =====
function render(){
  const app = $('#app');
  const view = state.view==='order' ? renderOrderView() : renderAdminView();
  app.innerHTML = renderHeader() + view;
  bindEvents();
}

// ===== events =====
function bindEvents(){
  document.querySelectorAll('[data-act]').forEach(el=>{
    const act = el.getAttribute('data-act');
    if(el.tagName==='INPUT' || el.tagName==='TEXTAREA'){
      const evt = (el.type==='number') ? 'input' : 'input';
      el.addEventListener(evt, e=>onInputChange(act, e.target.value));
      el.addEventListener('keydown', e=>{ if(e.key==='Enter' && act==='pin-input'){ onAction('pin-submit', el); } });
    } else {
      el.addEventListener('click', e=>onAction(act, el));
    }
  });
}

function onInputChange(act, val){
  const active = document.activeElement;
  const selStart = active ? active.selectionStart : null;
  const selEnd = active ? active.selectionEnd : null;
  const activeAct = active ? active.getAttribute('data-act') : null;

  switch(act){
    case 'search-product': state.productSearch = val; break;
    case 'set-distname': state.distName = val; break;
    case 'set-distregion': state.distRegion = val; break;
    case 'set-distphone': state.distPhone = val; break;
    case 'set-note': state.note = val; break;
    case 'qty-input': state.qty = Math.max(1, parseInt(val)||1); break;
    case 'pin-input': state.pinInput = val.replace(/[^0-9]/g,''); state.pinError=false; break;
    case 'admin-search': state.adminFilter = val; break;
  }
  render();
  // restore focus + caret for text-like inputs re-rendered
  if(activeAct){
    const el = document.querySelector(`[data-act="${activeAct}"]`);
    if(el && (el.tagName==='INPUT'||el.tagName==='TEXTAREA')){
      el.focus();
      if(selStart!=null && el.setSelectionRange){
        try{ el.setSelectionRange(selStart, selEnd); }catch(e){}
      }
    }
  }
}

async function onAction(act, el){
  switch(act){
    case 'goto':{
      const v = el.getAttribute('data-view');
      state.view = v;
      render();
      if(v==='admin' && state.adminUnlocked) loadOrders();
      break;
    }
    case 'set-group':
      state.mainGroup = el.getAttribute('data-val');
      state.selectedProduct=null; state.selectedColor=null; state.colorRequired=true; state.selectedUnit=null; state.productSearch='';
      render();
      break;
    case 'set-product':{
      state.selectedProduct = el.getAttribute('data-val');
      state.colorRequired = hasRealColors(state.mainGroup, state.selectedProduct);
      state.selectedColor = state.colorRequired ? null : '';
      const units = unitOptionsForGroup(state.mainGroup);
      state.selectedUnit = units.length===1 ? units[0] : null;
      render();
      break;
    }
    case 'set-color':
      state.selectedColor = el.getAttribute('data-val');
      render();
      break;
    case 'set-unit':
      state.selectedUnit = el.getAttribute('data-val');
      render();
      break;
    case 'qty-dec': state.qty = Math.max(1, state.qty-1); render(); break;
    case 'qty-inc': state.qty = state.qty+1; render(); break;
    case 'add-cart': addToCart(); break;
    case 'del-cart': removeFromCart(parseInt(el.getAttribute('data-idx'))); break;
    case 'submit-order': submitOrder(); break;
    case 'new-order': resetOrderForm(); break;
    case 'share-receipt': shareReceiptImage(); break;
    case 'download-receipt': downloadReceiptImage(); break;
    case 'pin-submit':
      if(state.pinInput === ADMIN_PIN){
        state.adminUnlocked = true; state.pinError=false;
        render();
        loadOrders();
      } else {
        state.pinError = true; render();
      }
      break;
    case 'toggle-status':{
      const id = el.getAttribute('data-id');
      const ord = state.orders.find(o=>o.id===id);
      const next = ord.status==='تم التسليم' ? 'قيد التنفيذ' : 'تم التسليم';
      updateOrderStatus(id, next);
      break;
    }
    case 'admin-status':
      state.adminStatusFilter = el.getAttribute('data-val');
      render();
      break;
    case 'export-excel':
      exportExcel();
      break;
    case 'delete-order':{
      const id = el.getAttribute('data-id');
      if(confirm('متأكد إنك عايز تحذف الطلب ده نهائيًا؟')){
        deleteOrder(id);
      }
      break;
    }
    case 'delete-delivered':
      if(confirm('هيتم حذف كل الطلبات "تم التسليم" نهائيًا. متأكد؟')){
        deleteDeliveredOrders();
      }
      break;
  }
}

async function exportExcel(){
  if(state.orders.length===0){ showToast('مفيش طلبات لتصديرها'); return; }
  if(typeof ExcelJS === 'undefined'){ showToast('حصل خطأ في تحميل أداة التصدير، حاول تاني'); return; }

  const NAVY = 'FF1F3050';
  const GOLD = 'FFC9A227';
  const LIGHT = 'FFF5F3EE';
  const WHITE = 'FFFFFFFF';

  const wb = new ExcelJS.Workbook();
  const ws = wb.addWorksheet('الطلبات حسب العميل', { views:[{ rightToLeft:true }] });

  ws.columns = [
    { header:'الموزع', key:'dist', width:22 },
    { header:'المنطقة', key:'region', width:18 },
    { header:'الصنف', key:'product', width:36 },
    { header:'الكمية', key:'qty', width:10 },
    { header:'الوحدة', key:'unit', width:12 },
    { header:'التاريخ', key:'date', width:18 },
  ];

  const headerRow = ws.getRow(1);
  headerRow.eachCell(cell=>{
    cell.font = { bold:true, color:{argb:WHITE}, size:12, name:'Arial' };
    cell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:NAVY} };
    cell.alignment = { horizontal:'center', vertical:'middle' };
    cell.border = { top:{style:'thin'}, bottom:{style:'thin'}, left:{style:'thin'}, right:{style:'thin'} };
  });
  headerRow.height = 22;

  const groups = new Map();
  state.orders.forEach(o=>{
    if(!groups.has(o.distName)) groups.set(o.distName, { region:o.distRegion||'', ts:o.ts, items:[] });
    o.items.forEach(it => groups.get(o.distName).items.push(it));
  });

  let rowIdx = 2;
  let groupColorToggle = false;
  groups.forEach((g, dist)=>{
    const startRow = rowIdx;
    const dateStr = new Date(g.ts).toLocaleDateString('ar-EG',{day:'2-digit',month:'2-digit',year:'numeric'});
    const fillColor = groupColorToggle ? LIGHT : WHITE;
    g.items.forEach((it, idx)=>{
      const row = ws.addRow({
        dist: idx===0 ? dist : '',
        region: idx===0 ? g.region : '',
        product: it.product + (it.color ? ' - ' + it.color : ''),
        qty: it.qty,
        unit: it.unitType || '',
        date: idx===0 ? dateStr : ''
      });
      row.eachCell(cell=>{
        cell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:fillColor} };
        cell.border = { top:{style:'hair',color:{argb:'FFDDDDDD'}}, bottom:{style:'hair',color:{argb:'FFDDDDDD'}}, left:{style:'hair',color:{argb:'FFDDDDDD'}}, right:{style:'hair',color:{argb:'FFDDDDDD'}} };
        cell.alignment = { horizontal:'right', vertical:'middle', wrapText:true };
        cell.font = { name:'Arial', size:11 };
      });
      rowIdx++;
    });
    if(g.items.length > 1){
      ws.mergeCells(startRow, 1, rowIdx-1, 1);
      ws.mergeCells(startRow, 2, rowIdx-1, 2);
      ws.mergeCells(startRow, 6, rowIdx-1, 6);
      const mergedDist = ws.getCell(startRow, 1);
      mergedDist.font = { bold:true, color:{argb:NAVY}, size:11, name:'Arial' };
      mergedDist.alignment = { horizontal:'right', vertical:'middle', wrapText:true };
    } else {
      const soloDist = ws.getCell(startRow, 1);
      soloDist.font = { bold:true, color:{argb:NAVY}, size:11, name:'Arial' };
    }
    groupColorToggle = !groupColorToggle;
  });

  ws.autoFilter = { from:'A1', to:'F1' };

  const buffer = await wb.xlsx.writeBuffer();
  const blob = new Blob([buffer], { type:'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'طلبات_الموزعين.xlsx';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ===== init =====
render();

</script>
</body>
